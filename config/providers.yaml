fireworks_ai:
  env_var: FIREWORKS_AI_API_KEY
  region: US
  docs_url: https://fireworks.ai/account/api-keys
  notes: Llama / Mixtral / Qwen fast endpoints
  aliases: [fireworks]

openrouter:
  env_var: OPENROUTER_API_KEY
  region: Aggregator
  docs_url: https://openrouter.ai/keys
  notes: Unified gateway for OpenAI / Anthropic / Google / 200+ others

replicate:
  env_var: REPLICATE_API_KEY
  region: US
  docs_url: https://replicate.com/account/api-tokens
  notes: Llama / Flux / SDXL via Replicate

nvidia_nim:
  env_var: NVIDIA_NIM_API_KEY
  region: US
  docs_url: https://build.nvidia.com/explore/discover
  notes: Llama / Mixtral on NVIDIA NIM
