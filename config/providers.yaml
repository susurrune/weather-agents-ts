  region: US
  docs_url: https://dashboard.cohere.com/api-keys
  notes: Command R / R+ embeddings + chat

mistral:
  env_var: MISTRAL_API_KEY
  region: EU
  docs_url: https://console.mistral.ai/api-keys/
  notes: Mistral Large / Codestral / Pixtral

groq:
  env_var: GROQ_API_KEY
  region: US
  docs_url: https://console.groq.com/keys
  notes: Llama / Mixtral / Gemma on Groq LPUs (fast inference)

xai:
  env_var: XAI_API_KEY
  region: US
  docs_url: https://console.x.ai/
  notes: Grok models (xAI)

perplexity:
  env_var: PERPLEXITY_API_KEY
  region: US
  docs_url: https://www.perplexity.ai/settings/api
  notes: Sonar (search-augmented) + Llama via Perplexity

together_ai:
  env_var: TOGETHER_API_KEY
  region: US
  docs_url: https://api.together.xyz/settings/api-keys
  notes: 200+ open models on Together
