# Weather Agents — Provider Catalog
#
# Single source of truth for every LLM provider wa knows about. Used by:
#   - core/llm.py to look up env-var names + know which "<provider>/<model>"
#     prefixes to route through LiteLLM
#   - cli/main.py /apikey command for the interactive set/del picker
#   - core/config.py load_provider_catalog() helper
#
# Schema for each entry:
#   env_var      Environment variable LiteLLM (and we) read the API key from
#   region       US | CN | EU | Local | Aggregator — for grouping in pickers
#   docs_url     Where the user goes to grab their key
#   base_url     Optional. For OpenAI-compatible third-party endpoints that
#                need LITELLM_API_BASE / OPENAI_API_BASE override.
#   notes        One-line description shown in the picker.
#   aliases      Alternative prefixes accepted in `<alias>/<model>` model ids
#                (e.g. zhipu accepts "glm/" as a shortcut).
#
# Adding a new provider: just append a new YAML block. The CLI picker and
# routing layer pick it up on next process start (or `/skills refresh`-
# equivalent if we add one). Custom user providers can be added in
# ~/.weather-agents/providers.yaml — that file is merged on top.

# ─── US / Western providers ────────────────────────────────────────────

openai:
  env_var: OPENAI_API_KEY
  region: US
  docs_url: https://platform.openai.com/api-keys
  notes: GPT-4.1 / o3 / o4-mini family

anthropic:
  env_var: ANTHROPIC_API_KEY
  region: US
  docs_url: https://console.anthropic.com/settings/keys
  notes: Claude Sonnet / Opus / Haiku family

google_gemini:
  env_var: GEMINI_API_KEY
  region: US
  docs_url: https://aistudio.google.com/app/apikey
  notes: Gemini 2.5 family via AI Studio
  aliases: [gemini]

google_vertex:
  env_var: VERTEX_AI_API_KEY
  region: US
  docs_url: https://cloud.google.com/vertex-ai/docs/start/client-libraries
