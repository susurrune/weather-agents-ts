# Weather Agents — Model Catalog
#
# Each agent can use a different model. Configure via:
#   wa config set default_model <model>
#   wa config set model.<agent> <model>
#
# Model id convention follows LiteLLM:
#   - bare name (e.g. gpt-5) when LiteLLM auto-detects the provider
#   - <provider>/<model> for everything else (deepseek/..., gemini/..., zhipu/...)
#
# Prices in USD per 1K tokens — approximate, as of 2026-05. Update when
# providers publish new pricing.
#
# Adding a new provider's models: append a new top-level block. The
# entry is informational — wa will route any "<known-provider>/<model>"
# id to LiteLLM even if it isn't listed here. Listing it makes the
# model appear in /model picker and gives the agent a context-window
# estimate.

