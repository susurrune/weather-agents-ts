<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Turner sunset on paper — not dark mode, never dark mode for her */
    --paper:          #f3ead7;
    --paper-deep:     #ebe0c7;
    --paper-edge:     #d9cbab;
    --ink:            #2a1f17;
    --ink-soft:       #574635;
    --ink-faint:      #8a7659;
    --ink-whisper:    #b9a684;
    --amber:          #b8741a;      /* her accent — burnt sienna */
    --amber-soft:     #d4a056;      /* afternoon gold */
    --seal:           #a73a2a;      /* 朱印 red — single strongest mark */
    --seal-deep:      #842c1f;
    --sea:            #5a7e8a;      /* the Temeraire blue, used sparingly */
    --hairline:       rgba(42,31,23,0.13);
    --hairline-soft:  rgba(42,31,23,0.07);

    --serif-display:  "Fraunces", "Noto Serif SC", "Songti SC", "STSong", serif;
    --serif-body:     "Spectral", "Noto Serif SC", "Songti SC", "STSong", serif;
    --serif-cjk:      "Noto Serif SC", "Songti SC", "STSong", "Spectral", serif;
    --mono:           "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;

    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);

    --column-max:  680px;
  }

  /* ═════ Per-agent theme overrides ═════ */
  body[data-agent="fog"] {
    --paper:          #eae8e4;
    --paper-deep:     #dddbd6;
    --paper-edge:     #ccc9c2;
    --ink:            #2c2b28;
    --ink-soft:       #5a5850;
    --ink-faint:      #8a877d;
    --ink-whisper:    #b5b1a6;
    --amber:          #7a8a8e;
    --amber-soft:     #9aacb0;
    --seal:           #5a7e8a;
    --seal-deep:      #3e6370;
    --sea:            #5a7e8a;
    --hairline:       rgba(44,43,40,0.12);
    --hairline-soft:  rgba(44,43,40,0.06);
  }
  body[data-agent="fog"] {
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(90,126,138,0.10), transparent 70%),
      radial-gradient(ellipse 50% 40% at 0% 100%, rgba(90,126,138,0.06), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
  }

  body[data-agent="rain"] {
    --paper:          #e4e6ea;
    --paper-deep:     #d6d9e0;
    --paper-edge:     #c2c6cf;
    --ink:            #1e2128;
    --ink-soft:       #3d4250;
    --ink-faint:      #6b7080;
    --ink-whisper:    #9a9eac;
    --amber:          #5568a8;
    --amber-soft:     #7888c0;
    --seal:           #3a5298;
    --seal-deep:      #2a3d75;
    --sea:            #3a5298;
    --hairline:       rgba(30,33,40,0.12);
    --hairline-soft:  rgba(30,33,40,0.06);
  }
  body[data-agent="rain"] {
    background:
      radial-gradient(ellipse 80% 50% at 30% 0%, rgba(58,82,152,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 80%, rgba(58,82,152,0.06), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
  }

  body[data-agent="frost"] {
    --paper:          #e8ecf0;
    --paper-deep:     #dce2e8;
    --paper-edge:     #c8d0d8;
    --ink:            #1a2028;
    --ink-soft:       #3a4350;
    --ink-faint:      #687888;
    --ink-whisper:    #98a8b5;
    --amber:          #4a8898;
    --amber-soft:     #6aa0b0;
    --seal:           #2a7088;
    --seal-deep:      #1a5568;
    --sea:            #2a7088;
    --hairline:       rgba(26,32,40,0.12);
    --hairline-soft:  rgba(26,32,40,0.06);
  }
  body[data-agent="frost"] {
    background:
      radial-gradient(ellipse 70% 50% at 70% 0%, rgba(42,112,136,0.08), transparent 60%),
      radial-gradient(ellipse 50% 40% at 0% 60%, rgba(42,112,136,0.05), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
  }

  body[data-agent="snow"] {
    --paper:          #ededf2;
    --paper-deep:     #e0e0e8;
    --paper-edge:     #d0d0da;
    --ink:            #1a1a28;
    --ink-soft:       #3a3a50;
    --ink-faint:      #6a6a80;
    --ink-whisper:    #9a9ab0;
    --amber:          #5a5a8a;
    --amber-soft:     #7a7aa8;
    --seal:           #4a4a80;
    --seal-deep:      #333360;
    --sea:            #4a4a80;
    --hairline:       rgba(26,26,40,0.12);
    --hairline-soft:  rgba(26,26,40,0.06);
  }
  body[data-agent="snow"] {
    background:
      radial-gradient(ellipse 60% 50% at 50% 10%, rgba(74,74,128,0.07), transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 90%, rgba(74,74,128,0.04), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
  }

  body[data-agent="dew"] {
    --paper:          #e8ece4;
    --paper-deep:     #dde2d6;
    --paper-edge:     #c8cfbe;
    --ink:            #1e2818;
    --ink-soft:       #3d4a35;
    --ink-faint:      #6b7a60;
    --ink-whisper:    #9aaa88;
    --amber:          #558a4a;
    --amber-soft:     #78a868;
    --seal:           #3a7a32;
    --seal-deep:      #2a5a22;
    --sea:            #3a7a32;
    --hairline:       rgba(30,40,24,0.12);
    --hairline-soft:  rgba(30,40,24,0.06);
  }
  body[data-agent="dew"] {
    background:
      radial-gradient(ellipse 70% 50% at 40% 0%, rgba(58,122,50,0.08), transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 70%, rgba(58,122,50,0.05), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
  }

  html, body { height: 100%; }

  body {
    color: var(--ink);
    font-family: var(--serif-body);
    font-size: 17px;
    line-height: 1.7;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern", "liga", "calt", "onum";

    /* Layered paper: base wash + warm vignette + grain */
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%,
        rgba(212, 160, 86, 0.15),
        transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%,
        rgba(167, 58, 42, 0.06),
        transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment: fixed;
    transition: background 0.6s ease, color 0.4s ease;

    display: flex; flex-direction: column;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  /* Grain overlay — subtle paper texture, fixed across the whole viewport */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.45;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0.20 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.85'/></svg>");
    mix-blend-mode: multiply;
  }

  /* All actual UI sits above the grain */
  header, .stage, .compose, .reconnect-bar { position: relative; z-index: 1; }

  /* ═════ Header ═════ */
  header {
    flex-shrink: 0;
    padding: calc(22px + var(--safe-top)) 28px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    gap: 16px;
    max-width: var(--column-max);
    margin: 0 auto;
    width: 100%;
  }

  /* 朱印 — the seal stamp. The single strongest mark on the whole page. */
  .seal {
    position: relative;
    width: 54px; height: 54px;
    background: var(--seal);
    color: var(--paper);
    display: grid; place-items: center;
    font-family: var(--serif-cjk);
    font-weight: 500;
    font-size: 30px;
    line-height: 1;
    border-radius: 2px;
    user-select: none;
    cursor: default;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.10),
      inset 0 0 12px rgba(132,44,31,0.35),
      0 1px 1px rgba(42,31,23,0.10);
    /* Slight irregularity — chop marks aren't perfect */
    transform: rotate(-1.5deg);
    transition: transform 0.6s ease, background 0.5s ease, box-shadow 0.5s ease;
  }
  .seal::before, .seal::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 1.2s ease;
    opacity: 0;
  }
  .seal::before {
    inset: -8px;
    background: radial-gradient(circle, rgba(167,58,42,0.30), transparent 70%);
  }
  .seal::after {
    inset: -16px;
    background: radial-gradient(circle, rgba(167,58,42,0.18), transparent 70%);
  }
  .seal.speaking { transform: rotate(-1.5deg) scale(1.02); }
  .seal.speaking::before { opacity: 1; animation: ink-bleed 2.4s ease-in-out infinite; }
  .seal.speaking::after  { opacity: 1; animation: ink-bleed 2.4s ease-in-out infinite 0.6s; }
  @keyframes ink-bleed {
    0%, 100% { transform: scale(0.92); opacity: 0.0; }
    40%      { transform: scale(1.05); opacity: 0.85; }
    100%     { transform: scale(1.20); opacity: 0.0; }
  }

  .brand {
    line-height: 1.05;
  }
  .brand .wordmark {
    font-family: var(--serif-display);
    font-weight: 300;
    font-size: 38px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand .wordmark em {
    font-style: italic;
    font-variation-settings: "SOFT" 100;
  }
  .brand .meta {
    margin-top: 4px;
    font-family: var(--serif-body);
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .brand .meta .sep {
    display: inline-block;
    width: 14px;
    border-top: 1px solid var(--ink-whisper);
    transform: translateY(-3px);
    margin: 0 6px;
  }

  /* Status + settings cluster, top-right */
  .ctl {
    display: flex; align-items: center; gap: 14px;
    color: var(--ink-soft);
  }
  .status {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    text-transform: lowercase;
  }
  .status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-whisper);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status.connected .dot { background: var(--amber); }
  .status.listening .dot { background: var(--seal); animation: dot-pulse 1.1s ease-in-out infinite; }
  .status.speaking  .dot { background: var(--sea); }
  .status.waiting   .dot { background: var(--amber-soft); animation: dot-pulse 1.4s ease-in-out infinite; }
  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.6); opacity: 0.5; }
  }

  .icon-btn {
    background: none; border: none;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 6px;
    display: inline-flex;
    transition: color 0.2s, transform 0.2s;
    border-radius: 50%;
  }
  .icon-btn:hover { color: var(--seal); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.open { color: var(--seal); }
  .icon-btn svg { width: 18px; height: 18px; display: block; }

  /* ═════ Settings drawer — margin annotation style ═════ */
  #settings {
    display: none;
    max-width: var(--column-max);
    margin: 0 auto;
    padding: 14px 28px 18px;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    background: rgba(235, 224, 199, 0.55);
    flex-shrink: 0;
    animation: settings-in 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative; z-index: 1;
  }
  @keyframes settings-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #settings.open { display: block; }
  .field {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    align-items: center;
    gap: 14px;
    margin: 8px 0;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .field.check { grid-template-columns: auto 1fr; }
  .field label {
    font-family: var(--serif-body);
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
  }
  .field input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px;
    background: var(--hairline);
    border-radius: 999px;
    outline: none;
  }
  .field input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--seal);
    cursor: pointer;
    border: 2px solid var(--paper);
    box-shadow: 0 1px 3px rgba(42,31,23,0.20);
  }
  .field input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--seal);
    cursor: pointer;
    border: 2px solid var(--paper);
  }
  .field .value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .field select {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hairline);
    color: var(--ink);
    font-family: var(--serif-body);
    font-size: 13px;
    padding: 4px 0;
    outline: none;
    cursor: pointer;
    width: 100%;
  }
  .field select:focus { border-bottom-color: var(--seal); }
  .field.check input[type="checkbox"] {
    width: 14px; height: 14px;
    accent-color: var(--seal);
    cursor: pointer;
  }
  .field.check label { cursor: pointer; color: var(--ink-soft); font-style: normal; }

  /* ═════ Reconnect / notice bars ═════ */
  .reconnect-bar {
    display: none;
    text-align: center;
    padding: 10px;
    max-width: var(--column-max);
    margin: 0 auto;
    color: var(--seal-deep);
    font-style: italic;
    font-size: 13px;
    cursor: pointer;
    border-top: 1px solid rgba(167,58,42,0.15);
    border-bottom: 1px solid rgba(167,58,42,0.15);
    background: rgba(167,58,42,0.04);
    flex-shrink: 0;
  }
  .reconnect-bar.show { display: block; }
  .reconnect-bar:hover { background: rgba(167,58,42,0.10); }

  /* Insecure-context notice — Chrome silently disables mic on non-HTTPS LAN */
  .notice {
    display: none;
    max-width: var(--column-max);
    margin: 0 auto;
    padding: 12px 22px;
    background: rgba(184,116,26,0.08);
    border-top: 1px solid rgba(184,116,26,0.30);
    border-bottom: 1px solid rgba(184,116,26,0.30);
    color: var(--ink);
    font-family: var(--serif-body);
    font-size: 13px;
    line-height: 1.55;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .notice.show { display: block; }
  .notice .title {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 400;
    color: var(--amber);
    font-size: 14px;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .notice a {
    color: var(--seal);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
    font-style: normal;
    font-family: var(--mono);
    font-size: 12px;
    word-break: break-all;
  }
  .notice a:hover { color: var(--seal-deep); }
  .notice .dismiss {
    position: absolute;
    top: 8px; right: 12px;
    background: none; border: none;
    color: var(--ink-faint);
    font-family: var(--serif-display);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
  }
  .notice .dismiss:hover { color: var(--seal); }

  /* Tiny inline cue under the input when listening — "say something" feedback */
  .mic-cue {
    display: none;
    margin-top: 8px;
    text-align: right;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 12px;
    color: var(--seal);
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }
  .mic-cue.show { display: block; }
  .mic-cue.hearing { color: var(--seal-deep); }
  .mic-cue .pulse-bar {
    display: inline-block;
    width: 3px; height: 9px;
    background: currentColor;
    border-radius: 1px;
    margin: 0 1.5px;
    vertical-align: -1px;
    transform-origin: bottom;
    animation: bar-idle 1.2s ease-in-out infinite;
  }
  .mic-cue .pulse-bar:nth-child(2) { animation-delay: 0.10s; }
  .mic-cue .pulse-bar:nth-child(3) { animation-delay: 0.20s; }
  .mic-cue .pulse-bar:nth-child(4) { animation-delay: 0.30s; }
  .mic-cue .pulse-bar:nth-child(5) { animation-delay: 0.40s; }
  @keyframes bar-idle {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50%      { transform: scaleY(0.7); opacity: 0.8; }
  }
  .mic-cue.hearing .pulse-bar { animation: bar-hearing 0.7s ease-in-out infinite; }
  @keyframes bar-hearing {
    0%, 100% { transform: scaleY(0.4); opacity: 0.7; }
    50%      { transform: scaleY(1.3); opacity: 1; }
  }

  /* ═════ Stage (messages column) ═════ */
  .stage {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
  }
  .stage::-webkit-scrollbar { width: 6px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb {
    background: var(--ink-whisper);
    border-radius: 3px;
    opacity: 0.5;
  }

  .column {
    display: flex;
    flex-direction: column;
    max-width: var(--column-max);
    margin: 0 auto;
    padding: 32px 28px 60px;
    width: 100%;
  }

  /* Welcome epigraph — italic, like a printed dedication */
  .welcome {
    text-align: center;
    margin: 36px auto 60px;
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    color: var(--ink-soft);
    line-height: 1.55;
    max-width: 460px;
  }
  .welcome .rule {
    display: block;
    width: 60px;
    margin: 22px auto 0;
    border-top: 1px solid var(--ink-whisper);
  }

  /* Conversation turns — left/right chat layout */
  .turn {
    display: flex;
    flex-direction: column;
    margin-bottom: 32px;
    animation: turn-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes turn-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Agent: left side, wider for CJK content */
  .turn.agent {
    align-self: flex-start;
    align-items: flex-start;
    max-width: 640px;
  }
  /* User: right side, narrower for conversational brevity */
  .turn.user {
    align-self: flex-end;
    align-items: flex-end;
    max-width: 480px;
  }

  .turn .tag {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.05em;
    line-height: 1.4;
    user-select: none;
    margin-bottom: 4px;
  }
  .turn.agent .tag { color: var(--seal); }
  .turn.user   .tag { color: var(--ink-whisper); text-align: right; }

  .turn .body {
    font-family: var(--serif-body);
    font-size: 17px;
    line-height: 1.78;
    color: var(--ink);
    white-space: pre-wrap;
    word-wrap: break-word;
    word-break: break-word;
    padding: 14px 18px;
    border-radius: 2px;
  }
  /* Agent body: paper tint with left seal accent */
  .turn.agent .body {
    font-family: var(--serif-cjk);
    background: color-mix(in srgb, var(--paper-deep) 35%, transparent);
    border-left: 2px solid var(--seal);
    transition: border-color 0.5s ease, background 0.5s ease;
  }
  /* User body: warm whisper tone, right-aligned */
  .turn.user .body {
    font-style: italic;
    font-weight: 300;
    color: var(--ink-soft);
    font-size: 16px;
    background: color-mix(in srgb, var(--amber-soft) 8%, transparent);
    border-right: 2px solid var(--amber-soft);
    text-align: right;
    transition: border-color 0.5s ease, background 0.5s ease;
  }

  /* Streaming caret — a thin vertical hairline of seal red */
  .turn.agent.streaming .body::after {
    content: "";
    display: inline-block;
    width: 1px;
    height: 1.1em;
    background: var(--seal);
    margin-left: 2px;
    vertical-align: -3px;
    animation: caret 1.0s steps(2) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* Rendered markdown within agent body */
  .turn.agent .body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px; }
  .turn.agent .body th { border-bottom: 2px solid var(--seal); padding: 6px 12px; text-align: left; font-weight: 500; color: var(--ink); }
  .turn.agent .body td { border-bottom: 1px solid var(--hairline); padding: 5px 12px; color: var(--ink-soft); }
  .turn.agent .body pre { background: rgba(42,31,23,0.05); padding: 12px 16px; border-radius: 2px; overflow-x: auto; font-family: var(--mono); font-size: 13px; white-space: pre; margin: 6px 0; }
  .turn.agent .body code { font-family: var(--mono); font-size: 13px; background: rgba(42,31,23,0.06); padding: 1px 4px; border-radius: 2px; }
  .turn.agent .body pre code { background: none; padding: 0; }
  .turn.agent .body h2, .turn.agent .body h3, .turn.agent .body h4 { color: var(--ink); margin: 12px 0 4px; white-space: normal; }
  .turn.agent .body h2 { font-size: 19px; }
  .turn.agent .body h3 { font-size: 17px; }
  .turn.agent .body h4 { font-size: 15px; }
  .turn.agent .body ul, .turn.agent .body ol { padding-left: 20px; margin: 4px 0; white-space: normal; }
  .turn.agent .body blockquote { border-left: 2px solid var(--amber-soft); margin: 6px 0; padding: 4px 14px; color: var(--ink-soft); font-style: italic; white-space: normal; }
  .turn.agent .body p { margin: 0 0 4px; white-space: normal; }
  .turn.agent .body hr { border: none; border-top: 1px solid var(--hairline); margin: 12px 0; }
  .turn.agent .body li { white-space: normal; }
  .turn.agent .body > :first-child { margin-top: 0; }
  .turn.agent .body > :last-child { margin-bottom: 0; }

  /* System / status notes — printer's mark style */
  .sys {
    align-self: center;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
    margin: 18px auto;
    max-width: 360px;
    letter-spacing: 0.04em;
    opacity: 0.85;
  }
  .sys::before, .sys::after {
    content: "";
    display: inline-block;
    width: 20px;
    border-top: 1px solid var(--ink-whisper);
    margin: 0 12px;
    transform: translateY(-3px);
    opacity: 0.7;
  }

  /* Thinking — three ink dots forming an em-dash thought */
  .think {
    display: grid;
    grid-template-columns: 64px 1fr;
    column-gap: 24px;
    margin-bottom: 24px;
  }
  .think .tag {
    text-align: right;
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: var(--seal);
    padding-top: 4px;
    opacity: 0.75;
  }
  .think .dots {
    display: inline-flex; gap: 6px;
    padding-top: 14px;
  }
  .think .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--seal);
    opacity: 0.4;
    animation: think-pulse 1.4s ease-in-out infinite;
  }
  .think .dots span:nth-child(2) { animation-delay: 0.20s; }
  .think .dots span:nth-child(3) { animation-delay: 0.40s; }
  @keyframes think-pulse {
    0%, 60%, 100% { transform: translateY(0) scale(1);   opacity: 0.35; }
    30%           { transform: translateY(-4px) scale(1.15); opacity: 0.95; }
  }

  /* ═════ Compose (input area) ═════ */
  .compose {
    flex-shrink: 0;
    border-top: 1px solid var(--hairline);
    background:
      linear-gradient(180deg, rgba(243,234,215,0.0) 0%, rgba(243,234,215,0.92) 18%),
      var(--paper);
    padding: 18px 28px calc(20px + var(--safe-bottom));
    max-width: var(--column-max);
    margin: 0 auto;
    width: 100%;
  }
  .compose-grid {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 14px;
    align-items: end;
  }
  .input-wrap {
    border-bottom: 1px solid var(--ink-faint);
    transition: border-color 0.25s;
    padding: 4px 2px 2px;
  }
  .input-wrap:focus-within { border-bottom-color: var(--seal); }
  #text-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: var(--serif-body);
    font-size: 16px;
    line-height: 1.5;
    padding: 8px 0;
    resize: none;
    min-height: 36px;
    max-height: 140px;
    font-weight: 400;
  }
  #text-input::placeholder {
    color: var(--ink-whisper);
    font-style: italic;
  }

  /* Action buttons — small circular ink stamps, not glowing */
  .act {
    background: transparent;
    border: 1px solid var(--ink-faint);
    color: var(--ink-soft);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
  }
  .act:disabled { opacity: 0.35; cursor: not-allowed; }
  .act:not(:disabled):active { transform: scale(0.92); }
  .act svg { width: 17px; height: 17px; display: block; }

  .act.send:not(:disabled):hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .act.mic {
    border-color: var(--seal);
    color: var(--seal);
    position: relative;
  }
  .act.mic:not(:disabled):hover {
    background: var(--seal);
    color: var(--paper);
  }
  .act.mic.active {
    background: var(--seal);
    color: var(--paper);
    border-color: var(--seal);
  }
  /* hearing-you: when speech actually detected — fuller ripples + brighter */
  .act.mic.hearing {
    background: var(--seal-deep);
    box-shadow: 0 0 0 4px rgba(167,58,42,0.18);
  }
  .act.mic.active::before {
    content: "";
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 1px solid var(--seal);
    opacity: 0.5;
    animation: mic-ripple 1.4s ease-out infinite;
    pointer-events: none;
  }
  .act.mic.active::after {
    content: "";
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px solid var(--seal);
    opacity: 0.25;
    animation: mic-ripple 1.4s ease-out infinite 0.4s;
    pointer-events: none;
  }
  @keyframes mic-ripple {
    0%   { transform: scale(0.95); opacity: 0.6; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  /* ═════ Other agents — printer's footer ═════ */
  .colophon {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--hairline-soft);
    text-align: center;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center; justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .colophon .lead {
    color: var(--ink-whisper);
    text-transform: lowercase;
  }
  .colophon .also {
    display: inline-flex; gap: 14px;
    align-items: baseline;
  }
  .colophon .swap {
    cursor: pointer;
    color: var(--ink-soft);
    font-style: normal;
    font-family: var(--serif-display);
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0;
    border-bottom: 1px dashed transparent;
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
    user-select: none;
  }
  .colophon .swap:hover { color: var(--seal); border-bottom-color: var(--seal); }
  .colophon .swap.active {
    color: var(--seal);
    border-bottom: 1px solid var(--seal);
    font-weight: 400;
  }

  /* ═════ Mobile ═════ */
  @media (max-width: 560px) {
    header { padding: calc(16px + var(--safe-top)) 16px 12px; gap: 10px; }
    .seal { width: 42px; height: 42px; font-size: 22px; }
    .brand .wordmark { font-size: 28px; }
    .brand .meta { font-size: 11px; }
    .brand .meta .sep { width: 10px; margin: 0 4px; }
    .ctl { gap: 6px; }
    .status { font-size: 11px; gap: 5px; }
    .icon-btn { padding: 8px; }
    .icon-btn svg { width: 20px; height: 20px; }
    #settings { padding: 12px 16px 16px; }
    .field { grid-template-columns: 90px 1fr auto; gap: 10px; font-size: 12px; }
    .column { padding: 18px 16px 40px; }
    .turn { margin-bottom: 24px; }
    .turn.agent { max-width: 90%; }
    .turn.user { max-width: 82%; }
    .turn .tag { font-size: 11px; }
    .turn .body { font-size: 15.5px; line-height: 1.72; padding: 10px 14px; }
    .turn.user .body { font-size: 14.5px; }
    .compose { padding: 12px 16px calc(14px + var(--safe-bottom)); }
    .compose-grid { gap: 10px; }
    /* 44px = Apple minimum touch target */
    .act { width: 44px; height: 44px; }
    .act svg { width: 19px; height: 19px; }
    /* 16px prevents iOS auto-zoom on focus */
    #text-input { font-size: 16px; padding: 6px 0; }
    .welcome { font-size: 16px; margin: 20px auto 36px; max-width: 320px; }
    .colophon { gap: 8px; padding-top: 10px; margin-top: 10px; }
    .colophon .also { gap: 10px; flex-wrap: wrap; justify-content: center; }
    .colophon .swap { font-size: 13px; padding: 4px 2px; }
    .colophon .lead { font-size: 11px; }
    .notice { padding: 10px 16px; font-size: 12px; line-height: 1.5; }
    .reconnect-bar { padding: 14px; font-size: 12px; min-height: 44px; }
    .sys { font-size: 11px; max-width: 280px; }
  }

  /* Very small phones (iPhone SE, 320px-class) */
  @media (max-width: 380px) {
    .seal { width: 36px; height: 36px; font-size: 19px; }
    .brand .wordmark { font-size: 24px; }
    .brand .meta { font-size: 10px; }
    .column { padding: 14px 12px 36px; }
    .turn.agent { max-width: 94%; }
    .turn.user { max-width: 88%; }
    .turn .tag { font-size: 10px; }
    .compose { padding: 10px 12px calc(12px + var(--safe-bottom)); }
    .compose-grid { gap: 8px; }
    .field { grid-template-columns: 78px 1fr auto; gap: 8px; }
    .welcome { font-size: 15px; margin: 16px auto 28px; max-width: 260px; }
  }

  /* Landscape on phones — vertical space is precious */
  @media (max-height: 500px) and (orientation: landscape) {
    header { padding: calc(6px + var(--safe-top)) 20px 4px; }
    .seal { width: 30px; height: 30px; font-size: 16px; }
    .brand .wordmark { font-size: 22px; }
    .brand .meta { display: none; }
    .column { padding: 8px 20px 24px; }
    .turn { margin-bottom: 14px; }
    .welcome { margin: 8px auto 20px; font-size: 15px; }
    .compose { padding: 6px 20px calc(6px + var(--safe-bottom)); }
    .colophon { margin-top: 6px; padding-top: 6px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Main wrapper ── */
  #main-wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  #sidebar {
    display: none;
  }

  .sidebar-head {
    padding: 18px 16px 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-toggle-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--hairline-soft);
    border-radius: 3px;
    color: var(--ink-faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .sidebar-toggle-btn:hover {
    border-color: var(--seal);
    color: var(--seal);
  }

  .sidebar-new-btn {
    width: 100%;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 3px;
    color: var(--ink-soft);
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: center;
  }
  .sidebar-new-btn:hover {
    border-color: var(--seal);
    color: var(--seal);
    background: rgba(167,58,42,0.04);
  }

  .sidebar-section {
    padding: 0 16px 14px;
  }

  .sidebar-label {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.09em;
    color: var(--ink-faint);
    text-transform: lowercase;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--hairline-soft);
    font-weight: 300;
  }

  .sidebar-agent-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 1px;
  }
  .sidebar-agent-item:hover {
    background: color-mix(in srgb, var(--amber) 6%, transparent);
  }
  .sidebar-agent-item.active {
    background: color-mix(in srgb, var(--amber) 9%, transparent);
    border-left: 2px solid var(--amber);
    padding-left: 8px;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .sidebar-agent-emoji {
    font-size: 19px;
    flex-shrink: 0;
    width: 26px;
    text-align: center;
    line-height: 1;
  }
  .sidebar-agent-name {
    font-family: var(--serif-display);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.3;
    display: block;
  }
  .sidebar-agent-spec {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
    line-height: 1.3;
    display: block;
  }

  #sidebar-history {
    max-height: 360px;
    overflow-y: auto;
  }
  .sidebar-history-item {
    padding: 7px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 1px;
  }
  .sidebar-history-item:hover {
    background: color-mix(in srgb, var(--amber) 6%, transparent);
  }
  .sidebar-history-item.active {
    background: color-mix(in srgb, var(--seal) 8%, transparent);
  }
  .sidebar-history-title {
    font-family: var(--serif-body);
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
  }
  .sidebar-history-meta {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 10px;
    color: var(--ink-faint);
    display: flex;
    gap: 6px;
    margin-top: 1px;
  }
  .sidebar-history-empty {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-whisper);
    padding: 6px 0;
    text-align: center;
  }

  /* ── Sidebar collapsed state ── */
  #sidebar.collapsed {
    width: 56px;
  }
  #sidebar.collapsed .sidebar-toggle-btn svg {
    transform: rotate(180deg);
  }
  #sidebar.collapsed .sidebar-btn-label,
  #sidebar.collapsed .sidebar-label,
  #sidebar.collapsed .sidebar-agent-name,
  #sidebar.collapsed .sidebar-agent-spec,
  #sidebar.collapsed .sidebar-history-title,
  #sidebar.collapsed .sidebar-history-meta,
  #sidebar.collapsed .sidebar-new-btn svg {

<script>
(function() {
'use strict';

// ── IndexedDB persistence ──
const DB_NAME   = 'fair-agent';
const DB_VER    = 1;
const STORE     = 'conversations';
const MAX_CONVS = 50;

function idb_open() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) return reject(new Error('IndexedDB unavailable'));
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('timestamp', 'timestamp', { unique: false });
      }
    };
    r.onsuccess = (e) => resolve(e.target.result);
    r.onerror   = (e) => reject(e.target.error);
  });
}

function idb_tx(mode, fn) {
  return idb_open().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, mode);
    const store = tx.objectStore(STORE);
    fn(store, resolve, reject, tx);
  }));
}

function idb_save(conv) {
  return idb_tx('readwrite', (store, resolve) => {
    store.put(conv);
    resolve();
  });
}

function idb_get(id) {
  return idb_tx('readonly', (store, resolve, reject) => {
    const r = store.get(id);
    r.onsuccess = () => resolve(r.result);
    r.onerror   = () => reject(r.error);
  });
}

function idb_list() {
  return idb_tx('readonly', (store, resolve) => {
    const r = store.index('timestamp').getAll();
    r.onsuccess = () => resolve(r.result || []);
  });
}

function idb_delete(id) {
  return idb_tx('readwrite', (store, resolve) => {
    store.delete(id);
    resolve();
  });
}

async function idb_prune() {
  try {
    const db = await idb_open();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      const countR = store.count();
      countR.onsuccess = () => {
        const count = countR.result;
        if (count <= MAX_CONVS) return resolve();
        const excess = count - MAX_CONVS;
        let deleted  = 0;
        const cursorR = store.index('timestamp').openCursor(null, 'next');
        cursorR.onsuccess = (e) => {
          const cur = e.target.result;
          if (cur && deleted < excess) {
            cur.delete();
            deleted++;
            cur.continue();
          } else {
            resolve();
          }
        };
      };
    });
  } catch (_) { /* DB unavailable, skip prune */ }
}

// ── State ──
let ws = null;
let isListening = false;
let isSpeaking = false;

let currentAgent = { name: 'fair', display_name: '晴', emoji: '☼', specialty: '情感陪伴' };
let agentList = [];
let recognition = null;
let autoListenEnabled = false;
let ttsEnabled = true;
let currentAgentMsgEl = null;

// Conversation history state
let currentConversationId = null;
let currentMessages       = [];

const UI = {
  stage:           document.getElementById('stage'),
  column:          document.getElementById('column'),
  welcome:         document.getElementById('welcome'),
  status:          document.getElementById('status'),
  statusText:      document.getElementById('status-text'),

  recLang:         document.getElementById('rec-lang'),
  ttsEnabled:      document.getElementById('tts-enabled'),
  autoListen:      document.getElementById('auto-listen'),
  settingsBtn:     document.getElementById('settings-btn'),
  settings:        document.getElementById('settings'),
  seal:            document.getElementById('seal'),
  brandTag:        document.getElementById('brand-tag'),
  brandSpec:       document.getElementById('brand-spec'),
  agentRow:        document.getElementById('agent-row'),
  insecureNotice:  document.getElementById('insecure-notice'),
  httpsUrl:        document.getElementById('https-url'),
  noticeDismiss:   document.getElementById('notice-dismiss'),
  micCue:          document.getElementById('mic-cue'),
  micCueText:      document.getElementById('mic-cue-text'),
};

// ── Lightweight markdown → HTML renderer ──
function renderMarkdown(text) {
  if (!text) return '';
  let html = _esc(text);

  // Code blocks (``` ... ```) — capture before other rules
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    '<pre><code class="' + _esc(lang) + '">' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>');

  // Inline code (`code`)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold (**text**)
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic (*text*) — but not inside words or already-tagged content
  html = html.replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<em>$1</em>');

  // Headings (### Title) — at line start
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

  // Unordered lists (- item or * item)
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Ordered lists (1. item)
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Horizontal rules (--- or ***)
  html = html.replace(/^(---|\*\*\*)$/gm, '<hr>');

  // Blockquotes (> text)
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Tables — match lines with | separators
  html = html.replace(/((?:^\|.+\|\n?)+)/gm, (tableBlock) => {
    const lines = tableBlock.trim().split('\n').filter(l => l.includes('|'));
    if (lines.length < 2) return tableBlock;
    // Detect header separator (|---|---|)
    const hasHeader = /^\|[\s:-]+\|/.test(lines[1]);
    const rows = hasHeader ? [lines[0], ...lines.slice(2)] : lines;
    const headerRow = hasHeader ? lines[0] : null;

    let table = '<table>';
    if (headerRow) {
      table += '<thead><tr>';
      headerRow.split('|').filter(c => c.trim()).forEach(c => {
        table += '<th>' + c.trim() + '</th>';
      });
      table += '</tr></thead>';
    }
    table += '<tbody>';
    rows.forEach(row => {
      table += '<tr>';
      row.split('|').filter(c => c.trim()).forEach(c => {
        table += '<td>' + c.trim() + '</td>';
      });
      table += '</tr>';
    });
    table += '</tbody></table>';
    return table;
  });

  // Paragraphs: blank-line-separated blocks that aren't already HTML tags
  html = html.replace(/(?:^|\n\n)((?!(?:<[a-z]|<\/))[^<][^\n]+)(?=\n\n|$)/gm, (_, p) => {
    const trimmed = p.trim();
    if (!trimmed) return '';
    if (/^<(h[2-4]|ul|ol|li|table|thead|tbody|tr|th|td|pre|blockquote|hr)/.test(trimmed)) return '\n\n' + trimmed;
    return '\n\n<p>' + trimmed + '</p>';
  });

  html = html.replace(/>\n+</g, '><').trim();
  return html;
}

// ── Utility helpers ──
function _esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function _fmtDate(ts) {
  const d    = new Date(ts);
  const now  = new Date();
  const days = Math.floor((now - d) / 86400000);
  const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (days === 0) return '今天 ' + time;
  if (days === 1) return '昨天 ' + time;
  return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + time;
}

function _convTitle(conv) {
  const um = conv.messages.find(m => m.role === 'user');
  if (um) {
    const t = um.text.trim();
    return t.length > 30 ? t.slice(0, 30) + '…' : t;
  }
  return (conv.agent_display || '对话') + ' · ' + _fmtDate(conv.timestamp);
}

// ── Conversation persistence ──
function trackUserMessage(text) {
  if (!currentConversationId) {
    currentConversationId = 'conv_' + Date.now();
  }
  currentMessages.push({ role: 'user', text, timestamp: Date.now() });
  persistCurrentConversation();
}

function trackAgentMessage(text) {
  if (!currentConversationId) return;
  currentMessages.push({ role: 'agent', text, timestamp: Date.now() });
  persistCurrentConversation();
}

async function persistCurrentConversation() {
  if (!currentConversationId) return;
  if (currentMessages.length === 0) return;
  const conv = {
    id:            currentConversationId,
    agent_name:    currentAgent.name,
    agent_display: currentAgent.display_name || currentAgent.name,
    agent_emoji:   currentAgent.emoji || '',
    timestamp:     currentMessages[0].timestamp,
    messages:      currentMessages.map(m => ({ role: m.role, text: m.text, timestamp: m.timestamp })),
  };
  try {
    await idb_save(conv);
    await idb_prune();
    renderSidebarHistory();
  } catch (_) { /* IndexedDB may be unavailable — degrade silently */ }
}

function newConversation() {
  if (currentConversationId && currentMessages.length > 0) {
    persistCurrentConversation();
  }
  currentConversationId = null;
  currentMessages       = [];
  UI.column.querySelectorAll('.turn, .think, .sys').forEach(el => el.remove());
  if (UI.welcome) {
    if (!UI.welcome.isConnected) UI.column.appendChild(UI.welcome);
    UI.welcome.style.display = '';
  }
  renderSidebarHistory();
  scrollBottom();
}

async function loadConversation(id) {
  if (id === currentConversationId) return;

  const conv = await idb_get(id);
  if (!conv) return;

  // Save current live conversation before switching
  if (currentConversationId && currentMessages.length > 0) {
    await persistCurrentConversation();
  }

  // Load as active conversation
  currentConversationId = id;
  currentMessages       = conv.messages.map(m => ({ role: m.role, text: m.text, timestamp: m.timestamp }));

  UI.column.querySelectorAll('.turn, .think, .sys').forEach(el => el.remove());
  UI.welcome.style.display = 'none';

  for (const msg of currentMessages) {
    if (msg.role === 'system') {
      addSysMsg(msg.text);
    } else {
      const turn = createTurn(msg.role);
      const tag  = turn.querySelector('.tag');
      if (msg.role === 'agent') {
        tag.textContent = (conv.agent_display || 'agent') + ' —';
      }
      turn.querySelector('.body').innerHTML = msg.role === 'agent' ? renderMarkdown(msg.text) : _esc(msg.text);
    }
  }
  scrollBottom();
  renderSidebarHistory();
  // Input stays enabled — user can continue the conversation
}

// ── Sidebar rendering ──
function renderSidebarAgents() {
  const container = document.getElementById('sidebar-agents');
  if (!container) return;
  container.innerHTML = '';
  agentList.forEach(a => {
    const item  = document.createElement('div');
    item.className = 'sidebar-agent-item';
    if (a.name === currentAgent.name) item.classList.add('active');
    item.dataset.agent = a.name;
    item.innerHTML =
      '<span class="sidebar-agent-emoji">' + (a.emoji || '') + '</span>' +
      '<span>' +
        '<span class="sidebar-agent-name">' + _esc(a.display_name || a.name) + '</span>' +
        '<span class="sidebar-agent-spec">' + _esc(a.specialty || '') + '</span>' +
      '</span>';
    item.addEventListener('click', () => {
      switchAgent(a.name);
    });
    container.appendChild(item);
  });
}

async function renderSidebarHistory() {
  const container = document.getElementById('sidebar-history');
  if (!container) return;
  if (!window.indexedDB) {
    container.innerHTML = '<div class="sidebar-history-empty">浏览器不支持本地存储</div>';
    return;
  }
  try {
    const list = await idb_list();
    list.sort((a, b) => b.timestamp - a.timestamp);

    if (list.length === 0) {
      container.innerHTML = '<div class="sidebar-history-empty">暂无对话</div>';
      return;
    }

    container.innerHTML = '';
    list.forEach(conv => {
      const title   = _convTitle(conv);
      const dateStr = _fmtDate(conv.timestamp);
      const isActive = conv.id === currentConversationId;

      const item = document.createElement('div');
      item.className = 'sidebar-history-item' + (isActive ? ' active' : '');
      item.dataset.id = conv.id;
      item.innerHTML =
        '<span class="sidebar-history-title">' + _esc(title) + '</span>' +
        '<div class="sidebar-history-meta">' +
          '<span>' + dateStr + '</span>' +
          '<span>' + _esc(conv.agent_display || '') + '</span>' +
        '</div>';
      item.addEventListener('click', () => loadConversation(conv.id));
      container.appendChild(item);
    });
  } catch (_) {
    container.innerHTML = '<div class="sidebar-history-empty">历史记录不可用</div>';
  }
}

// ── WebSocket ──
function getWsUrl() {
  const loc = window.location;
  const protocol = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  return protocol + '//' + loc.host + '/ws';
}

function connect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  ws = new WebSocket(getWsUrl());
  setStatus('connecting');

  ws.onopen = () => {
    setStatus('connected');
    reconnectDelay = 1000;
    UI.reconnectBar.classList.remove('show');
    ws.send(JSON.stringify({type: 'list_agents'}));
    if (pingInterval) clearInterval(pingInterval);
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'ping'}));
      }
    }, 55000);
  };

  ws.onmessage = (e) => {
    try { handleMsg(JSON.parse(e.data)); } catch(_) {}
  };

  ws.onclose = () => {
    setStatus('disconnected');
    isWaitingResponse = false;
    stopListening(true);
    setSpeakingVisual(false);
    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
    UI.reconnectBar.classList.add('show');
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect();
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => { try { ws.close(); } catch(_) {} };
}

function reconnect() {
  reconnectDelay = 1000;
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  UI.reconnectBar.classList.remove('show');
  connect();
}

// ── Status ──
function setStatus(s) {
  UI.status.classList.remove('connected', 'listening', 'speaking', 'waiting');
  switch (s) {
    case 'connected':  UI.status.classList.add('connected');  UI.statusText.textContent = 'connected'; break;
    case 'connecting': UI.statusText.textContent = 'connecting'; break;
    case 'listening':  UI.status.classList.add('listening');  UI.statusText.textContent = 'listening'; break;
    case 'speaking':   UI.status.classList.add('speaking');   UI.statusText.textContent = 'speaking'; break;
    case 'waiting':    UI.status.classList.add('waiting');    UI.statusText.textContent = 'thinking'; break;
    default:           UI.statusText.textContent = 'offline'; break;
  }
}

function setSpeakingVisual(on) {
  UI.seal.classList.toggle('speaking', !!on);
}

// ── Message handling ──
function handleMsg(msg) {
  switch (msg.type) {
    case 'start':
      isWaitingResponse = true;
      setStatus('waiting');
      currentAgentMsgEl = null;
      showThinking();
      pendingAudioChunks = [];
      serverTtsPending = false;
      break;
    case 'content':
      hideThinking();
      if (!currentAgentMsgEl) {
        currentAgentMsgEl = createTurn('agent');
        currentAgentMsgEl.classList.add('streaming');
      }
      appendBodyText(currentAgentMsgEl, msg.text || '');
      scrollBottom();
      break;
    case 'done':
      isWaitingResponse = false;
      lastFullText = msg.full_text || '';
      serverTtsPending = !!msg.tts && ttsEnabled;
      hideThinking();
      if (currentAgentMsgEl && lastFullText) {
        const body = currentAgentMsgEl.querySelector('.body');
        if (body) body.innerHTML = renderMarkdown(lastFullText);
        currentAgentMsgEl.classList.remove('streaming');
        scrollBottom();
      } else if (currentAgentMsgEl) {
        currentAgentMsgEl.classList.remove('streaming');
      }
      // Persist agent message to conversation history
      if (lastFullText) {
        trackAgentMessage(lastFullText);
      }

      if (serverTtsPending) {
        setStatus('waiting');
        if (serverTtsTimeoutId) clearTimeout(serverTtsTimeoutId);
        serverTtsTimeoutId = setTimeout(() => {
          serverTtsTimeoutId = null;
          serverTtsPending = false;
          isSpeaking = false;
          setSpeakingVisual(false);
          setStatus('connected');
          tryAutoListen();
        }, 15000);
      } else {
        setStatus('connected');
        tryAutoListen();
      }
      break;
    case 'audio_start':
      if (!ttsEnabled) break;
      pendingAudioB64 = '';
      setStatus('speaking');
      setSpeakingVisual(true);
      break;
    case 'audio_chunk':
      if (!ttsEnabled) break;
      pendingAudioChunks.push(msg.data);
      break;
    case 'audio_end':
      if (serverTtsTimeoutId) { clearTimeout(serverTtsTimeoutId); serverTtsTimeoutId = null; }
      if (!ttsEnabled) {
        pendingAudioChunks = [];
        serverTtsPending = false;
        isSpeaking = false;
        setSpeakingVisual(false);
        setStatus('connected');
        tryAutoListen();
        break;
      }
      if (msg.error) {
        serverTtsPending = false;
        pendingAudioChunks = [];
        isSpeaking = false;
        setSpeakingVisual(false);
        setStatus('connected');
        tryAutoListen();
      } else if (pendingAudioChunks.length) {
        playBase64Audio(pendingAudioChunks);
      } else {
        isSpeaking = false;
        setSpeakingVisual(false);
        setStatus('connected');
        tryAutoListen();
      }
      pendingAudioChunks = [];
      serverTtsPending = false;
      break;
    case 'status':
      addSysMsg(msg.label || '');
      break;
    case 'error':
      isWaitingResponse = false;
      hideThinking();
      setSpeakingVisual(false);
      addSysMsg('something interrupted — ' + (msg.text || ''));
      setStatus('connected');
      if (currentConversationId) {
        currentMessages.push({
          role: 'system',
          text: 'error: ' + (msg.text || ''),
          timestamp: Date.now()
        });
        persistCurrentConversation();
      }
      break;
    case 'pong':
      break;
    case 'agent_list':
      agentList = msg.agents || [];
      const match = agentList.find(a => a.name === msg.current);
      if (match) currentAgent = match;
      renderAgentRow();
      renderSidebarAgents();
      updateBrand();
      renderSidebarHistory();
      break;
    case 'agent_switched':
      // Persist current conversation before switching
      if (currentConversationId && currentMessages.length > 0) {
        persistCurrentConversation();
      }

      currentAgent = {
        name: msg.agent,
        display_name: msg.display_name,
        emoji: msg.emoji,
        specialty: msg.specialty,
      };
      currentConversationId = null;
      currentMessages       = [];

      UI.column.querySelectorAll('.turn, .think, .sys').forEach(el => el.remove());
      if (UI.welcome && !UI.welcome.isConnected) UI.column.appendChild(UI.welcome);
      UI.welcome.style.display = '';
      renderAgentRow();
      renderSidebarAgents();
      updateBrand();
      addSysMsg('now with ' + msg.display_name);
      break;
  }
}

// ── Conversation DOM ──
function createTurn(role) {
  if (UI.welcome) UI.welcome.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = 'turn ' + role;

  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = role === 'user' ? '你 —' : (currentAgent.display_name || '晴') + ' —';

  const body = document.createElement('div');
  body.className = 'body';

  wrap.appendChild(tag);
  wrap.appendChild(body);
  UI.column.appendChild(wrap);
  return wrap;
}

function appendBodyText(turnEl, text) {
  const body = turnEl.querySelector('.body');
  if (!body) return;
  body.appendChild(document.createTextNode(text));
}

function addSysMsg(text) {
  if (!text) return;
  const div = document.createElement('div');
  div.className = 'sys';
  div.textContent = text;
  UI.column.appendChild(div);
  scrollBottom();
}

function showThinking() {
  hideThinking();
  const wrap = document.createElement('div');
  wrap.className = 'think';
  wrap.id = 'think-indicator';

  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = (currentAgent.display_name || '晴') + ' —';

  const dots = document.createElement('div');
  dots.className = 'dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(tag);
  wrap.appendChild(dots);
  UI.column.appendChild(wrap);
  scrollBottom();
}

function hideThinking() {
  const el = document.getElementById('think-indicator');
  if (el) el.remove();
}

function scrollBottom() {
  requestAnimationFrame(() => { UI.stage.scrollTop = UI.stage.scrollHeight; });
}

function appendUserText(text) {
  const wrap = createTurn('user');
  const body = wrap.querySelector('.body');
  body.appendChild(document.createTextNode(text));
  scrollBottom();

  trackUserMessage(text);
}

// ── Secure context check ──
// Chrome/Edge silently disable webkitSpeechRecognition (and getUserMedia)
// on http://<LAN-IP> pages. They do NOT throw — recognition.start() resolves,
// the mic button turns red, and nothing happens. This is by far the most
// common "mic broken" report, so surface it loudly with a clickable
// https:// equivalent of the current URL.
function checkSecureContext() {
  const loc = window.location;
  const host = loc.hostname;
  const isLocalhost = host === 'localhost' || host === '127.0.0.1' || host === '[::1]';
  const isFile = loc.protocol === 'file:';
  const secure = window.isSecureContext || isLocalhost || isFile;
  if (secure) return true;

  // Build the equivalent https URL on the same host/port. The voice server
  // auto-generates a self-signed cert for LAN IPs, so this URL should work
  // (after the user clicks "Advanced → Proceed" once).
  const httpsHref = 'https://' + loc.host + loc.pathname + loc.search;
  if (UI.httpsUrl) {
    UI.httpsUrl.href = httpsHref;
    UI.httpsUrl.textContent = httpsHref;
  }
  UI.insecureNotice.classList.add('show');
  return false;
}

function setMicCue(state, label) {
  if (state === 'off') {
    UI.micCue.classList.remove('show', 'hearing');
    return;
  }
  if (label !== undefined) UI.micCueText.textContent = label;
  UI.micCue.classList.add('show');
  UI.micCue.classList.toggle('hearing', state === 'hearing');
}

// ── Speech Recognition ──
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addSysMsg('your browser does not support voice — try Chrome or Edge');
    UI.micBtn.disabled = true;
    return;
  }
  recognition = new SR();
  recognition.lang = UI.recLang.value;
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[e.results.length - 1][0].transcript;
    if (!text.trim()) return;
    stopSpeaking();
    stopListening(true);
    appendUserText(text);
    isWaitingResponse = true;
    sendSpeech(text);
    setStatus('waiting');
  };

  // Live feedback events — without these the user sees a red button and
  // can't tell whether the mic is actually capturing.
  recognition.onaudiostart  = () => { setMicCue('listening', '在听… 请说'); };
  recognition.onsoundstart  = () => { setMicCue('hearing',   '听到了 — 继续'); UI.micBtn.classList.add('hearing'); };
  recognition.onspeechstart = () => { setMicCue('hearing',   '听到了 — 继续'); UI.micBtn.classList.add('hearing'); };
  recognition.onspeechend   = () => { setMicCue('listening', '正在识别…'); UI.micBtn.classList.remove('hearing'); };
  recognition.onaudioend    = () => { UI.micBtn.classList.remove('hearing'); };
  recognition.onnomatch     = () => { addSysMsg('没听清,再说一次?'); };

  recognition.onerror = (e) => {
    isListening = false;
    UI.micBtn.classList.remove('hearing');
    // The mic visual (.active = red background) must be cleared on EVERY
    // error path. Earlier versions early-returned on 'no-speech' before
    // touching the class, so a silent click left the button red forever
    // with no way for the user to release it.
    UI.micBtn.classList.remove('active');
    setMicCue('off');
    if (e.error === 'no-speech') {
      if (autoListenEnabled && !isWaitingResponse && !isSpeaking && !userStoppedListening
          && ws && ws.readyState === WebSocket.OPEN) {
        setTimeout(() => startListening(), 120);
      } else {
        setStatus('connected');
      }
      return;
    }
    // Human-readable messages for the common failures.
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      addSysMsg('麦克风权限被拒 — 请在浏览器地址栏左侧解锁麦克风,或确认走的是 HTTPS');
    } else if (e.error === 'audio-capture') {
      addSysMsg('找不到麦克风设备');
    } else if (e.error === 'network') {
      addSysMsg('语音识别走的是 Google 服务,需要外网连接');
    } else if (e.error !== 'aborted') {
      addSysMsg('voice error — ' + e.error);
    }
    setStatus('connected');
  };

  recognition.onend = () => {
    isListening = false;
    UI.micBtn.classList.remove('hearing');
    // Only enter auto-restart if explicitly enabled AND the WS is still
    // open — otherwise we burn into a tight loop where recognition.start
    // re-throws and the user sees the mic flicker without any way to
    // reach the agent.
    const canAutoRestart =
      autoListenEnabled && !isWaitingResponse && !isSpeaking && !userStoppedListening
      && ws && ws.readyState === WebSocket.OPEN;
    if (canAutoRestart) {
      setMicCue('listening', '在听… 请说');
      setTimeout(() => startListening(), 120);
    } else {
      UI.micBtn.classList.remove('active');
      setMicCue('off');
      if (!isWaitingResponse) setStatus('connected');
    }
  };
}

function startListening() {
  if (!recognition || isListening || isWaitingResponse || isSpeaking) return;
  // Don't even try if the context is insecure — Chrome will swallow this
  // silently and the user wonders why nothing happens.
  if (!window.isSecureContext) {
    const host = window.location.hostname;
    if (host !== 'localhost' && host !== '127.0.0.1') {
      addSysMsg('当前页面不是 HTTPS / localhost,浏览器会禁用麦克风');
      UI.insecureNotice.classList.add('show');
      return;
    }
  }
  try {
    recognition.lang = UI.recLang.value;
    recognition.start();
    isListening = true;
    UI.micBtn.classList.add('active');
    setMicCue('listening', '准备好了… 请说');
    setStatus('listening');
  } catch(e) {
    isListening = false;
    UI.micBtn.classList.remove('active');
    setMicCue('off');
    setStatus('connected');
    if (e && e.name !== 'InvalidStateError') addSysMsg('启动语音识别失败 — ' + (e.message || e.name));
  }
}

function stopListening(silent) {
  // Defensive cleanup: always wipe visual state regardless of isListening,
  // because state can desync (recognition.onerror sets isListening=false
  // before the user clicks the mic to release, leaving .active stuck on).
  if (recognition) {
    try { recognition.stop(); } catch(_) {}
  }
  isListening = false;
  UI.micBtn.classList.remove('active');
  UI.micBtn.classList.remove('hearing');
  setMicCue('off');
  if (!silent) setStatus('connected');
}

function toggleListening() {
  // Treat the visual state as authoritative — if the mic button looks
  // active (red) but isListening went stale, the user's intent is "turn
  // this thing off", not "start a new session". stopListening() is now
  // idempotent so calling it twice is safe.
  const looksActive = isListening || UI.micBtn.classList.contains('active');
  if (looksActive) {
    userStoppedListening = true;
    stopListening();
  } else {
    userStoppedListening = false;
    ensureAudio();
    stopSpeaking();
    startListening();
  }
}

// ── Speech Synthesis ──
function stopSpeaking() {
  if (currentAudioSource) {
    try { currentAudioSource.stop(); } catch(_) {}
    currentAudioSource = null;
  }
  isSpeaking = false;
  setSpeakingVisual(false);
}

function tryAutoListen() {
  if (autoListenEnabled && !isWaitingResponse && !isSpeaking && ws && ws.readyState === WebSocket.OPEN) {
    startListening();
  }
}

// ── Agent footer (also try) ──
function renderAgentRow() {
  const row = UI.agentRow;
  if (!row) return;
  row.innerHTML = '';
  agentList.forEach(a => {
    if (a.name === currentAgent.name) return;
    const el = document.createElement('span');
    el.className = 'swap';
    el.textContent = a.display_name || a.name;
    el.title = a.specialty || '';
    el.addEventListener('click', () => switchAgent(a.name));
    row.appendChild(el);
  });
  // Also show current as active marker
  const cur = document.createElement('span');
  cur.className = 'swap active';
  cur.textContent = currentAgent.display_name || '晴';
  row.insertBefore(cur, row.firstChild);
}

const AGENT_THEMES = {
  fair:  { wordmark: 'Fair',  tag: 'an afternoon together',     welcome: 'Sit. Read. Speak when you\'re ready.',        themeColor: '#f3ead7' },
  fog:   { wordmark: 'Fog',   tag: 'through the looking glass', welcome: 'Ask the question no one else thought to ask.', themeColor: '#eae8e4' },
  rain:  { wordmark: 'Rain',  tag: 'words into being',          welcome: 'Tell me what to make. I\'ll shape it.',        themeColor: '#e4e6ea' },
  frost: { wordmark: 'Frost', tag: 'measure twice',             welcome: 'Show me. I\'ll find what doesn\'t hold.',      themeColor: '#e8ecf0' },
  snow:  { wordmark: 'Snow',  tag: 'the bigger picture',        welcome: 'Describe the goal. I\'ll draw the map.',       themeColor: '#ededf2' },
  dew:   { wordmark: 'Dew',   tag: 'steady hands',              welcome: 'What needs running? I\'ll keep it alive.',     themeColor: '#e8ece4' },
};

function updateBrand() {
  const name = currentAgent.name || 'fair';
  const theme = AGENT_THEMES[name] || AGENT_THEMES.fair;

  document.body.setAttribute('data-agent', name);
  document.title = theme.wordmark + ' · ' + (currentAgent.display_name || '晴');

  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme.themeColor);

  const stamp = (currentAgent.display_name || '晴').slice(0, 1);
  UI.seal.textContent = stamp;
  UI.brandSpec.textContent = currentAgent.specialty || '';
  UI.brandTag.textContent = theme.tag;

  const wm = document.querySelector('.brand .wordmark');
  if (wm) wm.innerHTML = '<em>' + _esc(theme.wordmark) + '</em>';

  if (UI.welcome) {
    const rule = UI.welcome.querySelector('.rule');
    UI.welcome.textContent = theme.welcome;
    if (rule) UI.welcome.appendChild(rule);
    else {
      const r = document.createElement('span');
      r.className = 'rule';
      UI.welcome.appendChild(r);
    }
  }
}

function switchAgent(name) {
  if (name === currentAgent.name) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'switch_agent', agent: name}));
  }
}

// ── Audio context (user gesture for mobile) ──
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playBase64Audio(chunks) {
  try {
    const parts = chunks.map(c => {
      const bin = atob(c);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return arr;
    });
    const totalLen = parts.reduce((s, p) => s + p.length, 0);
    const bytes = new Uint8Array(totalLen);
    let off = 0;
    for (const p of parts) { bytes.set(p, off); off += p.length; }
    ensureAudio();
    if (audioCtx.state === 'suspended') throw new Error('AudioContext suspended');
    isSpeaking = true;
    setStatus('speaking');
    setSpeakingVisual(true);
    audioCtx.decodeAudioData(bytes.buffer, (buffer) => {
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      currentAudioSource = source;
      source.start(0);
      source.onended = () => {
        if (currentAudioSource === source) currentAudioSource = null;
        isSpeaking = false;
        setSpeakingVisual(false);
        setStatus('connected');
        tryAutoListen();
      };
    }, () => {
      isSpeaking = false;
      setSpeakingVisual(false);
      setStatus('connected');
      addSysMsg('voice could not decode');
      tryAutoListen();
    });
  } catch(e) {
    isSpeaking = false;
    setSpeakingVisual(false);
    setStatus('connected');
    addSysMsg('voice could not play — ' + e.message);
    tryAutoListen();
  }
}

// ── Send ──
function sendSpeech(text) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'speech', text}));
  } else {
    addSysMsg('disconnected — cannot send');
    connect();
  }
}

function sendText(text) {
  if (!text.trim()) return;
  if (text.startsWith('/')) { handleCommand(text); return; }
  stopSpeaking();
  stopListening(true);
  ensureAudio();
  appendUserText(text);
  isWaitingResponse = true;
  sendSpeech(text);
  setStatus('waiting');
  UI.textInput.value = '';
  UI.sendBtn.disabled = true;
  resizeTextarea();
}

// ── Commands ──
function handleCommand(text) {
  const parts = text.toLowerCase().split(/\s+/);
  const cmd = parts[0];
  const arg = parts.slice(1).join(' ');
  switch (cmd) {
    case '/help':
      addSysMsg('/help  /clear  /lang zh|en|ja');
      break;
    case '/clear':
      newConversation();
      break;
    case '/lang': {
      if (!arg) { addSysMsg('current — ' + UI.recLang.value); break; }
      const langMap = { zh: 'zh-CN', en: 'en-US', ja: 'ja-JP' };
      const lang = langMap[arg] || arg;
      UI.recLang.value = lang;
      if (recognition) recognition.lang = lang;
      addSysMsg('language — ' + UI.recLang.options[UI.recLang.selectedIndex].text);
      break;
    }
    default:
      addSysMsg('unknown — ' + cmd);
  }
  UI.textInput.value = '';
  UI.sendBtn.disabled = true;
  resizeTextarea();
}

function resizeTextarea() {
  UI.textInput.style.height = 'auto';
  UI.textInput.style.height = Math.min(UI.textInput.scrollHeight, 140) + 'px';
}

// ── UI Events ──
UI.micBtn.addEventListener('click', toggleListening);
UI.sendBtn.addEventListener('click', () => sendText(UI.textInput.value));
UI.textInput.addEventListener('input', () => {
  resizeTextarea();
  UI.sendBtn.disabled = !UI.textInput.value.trim();
});
UI.textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (UI.textInput.value.trim()) sendText(UI.textInput.value);
  }
});
UI.reconnectBar.addEventListener('click', reconnect);
UI.ttsRate.addEventListener('input', () => { UI.ttsRateVal.textContent = UI.ttsRate.value; });
UI.recLang.addEventListener('change', () => { if (recognition) recognition.lang = UI.recLang.value; });
UI.ttsEnabled.addEventListener('change', () => { ttsEnabled = UI.ttsEnabled.checked; });
UI.autoListen.addEventListener('change', () => { autoListenEnabled = UI.autoListen.checked; });
UI.settingsBtn.addEventListener('click', () => {
  const open = UI.settings.classList.toggle('open');
  UI.settingsBtn.classList.toggle('open', open);
});
UI.noticeDismiss.addEventListener('click', () => UI.insecureNotice.classList.remove('show'));

// ── Sidebar toggle ──
const sidebarEl       = document.getElementById('sidebar');
const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');

function toggleSidebar() {
  if (!sidebarEl) return;
  const collapsed = sidebarEl.classList.toggle('collapsed');
  try { localStorage.setItem('wa-sidebar-collapsed', collapsed ? '1' : '0'); } catch (_) {}
}
if (sidebarToggleBtn) sidebarToggleBtn.addEventListener('click', toggleSidebar);

// Restore sidebar state on load
(function restoreSidebar() {
  if (!sidebarEl) return;
  try {
    if (localStorage.getItem('wa-sidebar-collapsed') === '1') {
      sidebarEl.classList.add('collapsed');
    }
  } catch (_) {}
})();

// ── Sidebar UI events ──
const newConvBtn = document.getElementById('new-conv-btn');
if (newConvBtn) newConvBtn.addEventListener('click', newConversation);

// ── Init ──
connect();
checkSecureContext();
initRecognition();

window.addEventListener('online', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) connect();
});

})();
</script>
</body>
